<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PumaScript | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .login-glass { background: rgba(10, 15, 30, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 min-h-screen flex items-center justify-center p-6 font-mono uppercase tracking-widest overflow-hidden">
    
    <!-- Decoración de fondo -->
    <div class="absolute inset-0 z-0">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-orange-500/10 rounded-full blur-[120px]"></div>
    </div>

    <div class="w-full max-w-md relative z-10">
        <div class="text-center mb-10">
            <div class="bg-orange-500/20 w-16 h-16 rounded-2xl border border-orange-500/30 flex items-center justify-center mx-auto mb-6">
                <i data-lucide="terminal" class="text-orange-500 w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-black text-white">PUMASCRIPT <span class="text-orange-500">SYSTEM</span></h1>
            <p class="text-[10px] text-slate-500 mt-2">INGRESE CREDENCIALES DE ACCESO NIVEL 1</p>
        </div>

        <div class="login-glass p-8 rounded-[2rem] border border-slate-800 shadow-2xl">
            <form action="/login" method="POST" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 ml-1">USUARIO_ID</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                        <input type="text" name="username" class="w-full bg-slate-950 border border-slate-800 rounded-xl py-3 pl-12 pr-4 text-white text-sm focus:border-orange-500 focus:outline-none transition" placeholder="ADMIN" required>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 ml-1">CONTRASEÑA_ACCESO</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                        <input type="password" name="password" class="w-full bg-slate-950 border border-slate-800 rounded-xl py-3 pl-12 pr-4 text-white text-sm focus:border-orange-500 focus:outline-none transition" placeholder="********" required>
                    </div>
                </div>

                <!-- Mensajes de error -->
                {% with messages = get_flashed_messages() %}
                  {% if messages %}
                    {% for message in messages %}
                      <p class="text-rose-500 text-[9px] text-center font-bold tracking-tighter">{{ message }}</p>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <button type="submit" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-4 rounded-xl shadow-lg shadow-orange-900/20 transition flex items-center justify-center gap-2 text-xs">
                    <i data-lucide="shield-check" class="w-4 h-4"></i> VALIDAR_ACCESO
                </button>
            </form>
        </div>

        <p class="text-center text-[9px] text-slate-600 mt-8 tracking-[0.3em]">
            © 2026 PUMASCRIPT SOLUTIONS // SECURE_ACCESS_V2
        </p>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
